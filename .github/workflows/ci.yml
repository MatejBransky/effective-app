name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, closed]

# Queues overlapping runs on the same ref instead of racing two deploys against
# the same stage's Cloudflare resources.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  # PRs deploy to their own isolated pr-{number} stage; pushes to main deploy to
  # prod; anything else (a manual workflow_dispatch on another branch, say) falls
  # back to the branch name - see docs/data-model.md's "GitHub CI/CD" section.
  STAGE: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || (github.ref == 'refs/heads/main' && 'prod' || github.ref_name) }}

jobs:
  test:
    name: Build and Test
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # To use Turborepo Remote Caching, set the following environment variables for the
    # job (TURBO_TOKEN as a repo secret, TURBO_TEAM as a repo variable), then uncomment.
    # env:
    #   TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    #   TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          # Full history, not a shallow checkout - `turbo run --affected` (planned once we
          # have enough packages for it to matter) needs enough git history to diff against;
          # too-shallow a checkout makes turbo treat every package as changed.
          fetch-depth: 0

      # Reads the pnpm version to install from the packageManager field in package.json.
      - uses: pnpm/action-setup@v6

      # Caches Turborepo's local task cache across runs, keyed per-commit with a fallback
      # to the most recent cache for this OS - avoids re-running unchanged tasks in CI
      # without needing a Vercel Remote Cache account.
      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify (lint, format, typecheck)
        run: pnpm run verify

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  security:
    name: Security checks
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          # gitleaks scans the full commit range being pushed/PR'd, not just the
          # working tree - needs real history, not a 1-commit shallow checkout.
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Known-CVE scan against the resolved dependency tree - high severity only,
      # so a new moderate-severity advisory in a transitive dep doesn't block every
      # PR; this repo's pnpm-workspace.yaml minimumReleaseAge/strictDepBuilds
      # policies already cover supply-chain risk at install time (see there).
      - name: pnpm audit
        run: pnpm audit --audit-level=high

      # Catches secrets accidentally committed (API keys, tokens, private keys) -
      # free, no account/license needed, unlike GitHub's own secret scanning which
      # requires GitHub Advanced Security on private repos.
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Cloudflare
    needs: [test, security]
    if: github.event.action != 'closed'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        run: pnpm --filter @repo/infra run deploy -- --stage "$STAGE"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PULL_REQUEST: ${{ github.event.number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    name: Destroy PR preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Safety check
        run: |
          if [ "$STAGE" = "prod" ]; then
            echo "ERROR: Cannot destroy prod environment in cleanup job"
            exit 1
          fi

      - name: Destroy preview environment
        run: pnpm --filter @repo/infra run destroy -- --stage "$STAGE"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PULL_REQUEST: ${{ github.event.number }}
