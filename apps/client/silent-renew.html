    <!--
      Loaded in a hidden iframe by oidc-client-ts's `signinSilent()` (`prompt=none`
      against Keycloak's own SSO session cookie) - see src/lib/auth.ts's module comment

      is what recovers a session across a page reload instead. A second Vite HTML entry
      point (see vite.config.ts's `build.rollupOptions.input`), not a route: its whole job
      is to run inside the hidden iframe and report back to the parent window via
      `signinSilentCallback()`, not to render UI.
    -->
