packages:
  - "apps/*"
  - "packages/*"
  - "packages/shared/*"
  - "packages/entities/*"
  - "packages/features/*"
  - "packages/widgets/*"

# Pin every install to an exact version (no ^ / ~ ranges) so upgrades are always explicit.
saveExact: true

# Was `auto-install-peers = true` in .npmrc pre-v11; .npmrc is auth/registry only now.
autoInstallPeers: true

# Shared versions for common devDependencies, referenced from package.json via "catalog:".
# https://pnpm.io/catalogs
catalog:
  typescript: 7.0.2
  "@types/node": 24.13.3
  oxlint: 1.74.0
  oxfmt: 0.59.0
  turbo: 2.10.5
  vitest: 4.1.10
  "@effect/vitest": 4.0.0-beta.98
  # Effect v4 ("effect smol") - beta, but this is what repos/effect (vendored from the
  # Effect-TS/effect main branch) is already on, so we're tracking the same line.
  effect: 4.0.0-beta.98
  drizzle-orm: 0.45.2
  drizzle-kit: 0.31.10
  # Node runtime adapter for effect/unstable/httpapi - a separate package from `effect`
  # itself in this v4 line. Pinned to the exact same beta as `effect` above.
  "@effect/platform-node": 4.0.0-beta.98
  # JWT/JWKS verification for apps/server's AuthService - vendored Effect v4 has no
  # built-in JWT support (HttpApiSecurity only extracts the raw credential string).
  jose: 6.2.3
  # node-postgres, not postgres.js - matches the driver @effect/sql-pg wraps, so a later
  # Effect-based query layer shares the same driver/connection-pool conventions.
  pg: 8.22.0
  "@types/pg": 8.20.0
  react: 19.2.7
  react-dom: 19.2.7
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  "@tanstack/react-router": 1.170.18

# Supply-chain security: https://pnpm.io/supply-chain-security
# pnpm 11 already defaults most of this; pinned explicitly so the posture can't silently
# weaken if a future pnpm major changes its defaults.

# Reject a package version until it has been public for a day - gives the community time
# to flag "zero-day" malicious releases before we can install them.
minimumReleaseAge: 1440
# Bypass the cooldown for specific package@version entries that need a hotfix immediately.
minimumReleaseAgeExclude: []

# Refuse to install a version whose publish provenance/CI attestation is weaker than the
# previously installed one (e.g. a hijacked maintainer publishing without CI).
trustPolicy: no-downgrade
trustPolicyExclude:
  # @effect/vitest@4.0.0-beta.98 flagged as a trust downgrade (prior versions had npm
  # "trusted publisher", this one has SLSA provenance attestation instead) - checked
  # npm metadata: beta.97 and beta.98 are published by the same `effect-bot` npm user,
  # same maintainer list, same source repo (Effect-TS/effect, the same upstream we
  # vendor into repos/effect), consistent with the Effect team switching their CI
  # publish mechanism rather than an account takeover. User-approved 2026-07-15;
  # revisit if pnpm flags it again elsewhere.
  - "@effect/vitest@4.0.0-beta.98"
  # effect@4.0.0-beta.98 - same trust-downgrade pattern as @effect/vitest@4.0.0-beta.98
  # above (same `effect-bot` npm user, same maintainers, same Effect-TS/effect repo) -
  # this is a whole-monorepo CI publish-mechanism change across the beta.98 release,
  # not an isolated package. User-approved 2026-07-15; revisit if pnpm flags it again
  # elsewhere.
  - "effect@4.0.0-beta.98"
  # @effect/platform-node@4.0.0-beta.98 - same trust-downgrade pattern as effect@4.0.0-beta.98
  # and @effect/vitest@4.0.0-beta.98 above (checked npm metadata: same `effect-bot` npm user,
  # same maintainers, same Effect-TS/effect-smol repo). User-approved 2026-07-16.
  - "@effect/platform-node@4.0.0-beta.98"
  # @effect/platform-node-shared@4.0.0-beta.98 - transitive dep of @effect/platform-node
  # above, same publish-mechanism trust-downgrade pattern (same `effect-bot` npm user,
  # same Effect-TS/effect-smol repo). No further Effect-TS deps beneath this one (checked
  # npm metadata). User-approved 2026-07-16.
  - "@effect/platform-node-shared@4.0.0-beta.98"
  # semver@6.3.1 (transitive dep of @babel/core via @tanstack/router-plugin) predates npm
  # provenance (introduced ~April 2023; 6.3.1 published 2023-07-10) and has none, while some
  # other version in its history does - a registry-side metadata touch on 2026-07-06 hit
  # every version of the package (6.0.0 from 2019 has the same modified timestamp), so this
  # reads as inconsistent provenance backfill, not a hijacked release. semver is maintained
  # by npm-cli-ops directly. Investigated 2026-07-15; revisit if pnpm flags it again elsewhere.
  - semver@6.3.1
  # @trickfilm400/rollup-plugin-off-main-thread@3.0.0-pre1 (transitive dep of workbox-build,
  # via vite-plugin-pwa) is workbox-build@7.4.1's own declared, official dependency - not
  # something injected below our tree. The original rollup-plugin-off-main-thread (by surma,
  # a Google engineer) stopped at v1.1.1; trickfilm400 has been the actively-maintained
  # community continuation since May 2024, and Google's own Workbox team adopted this exact
  # scoped fork as workbox-build's upstream. Provenance is present on 2.4.3, 2.5.0, and
  # 4.0.0-pre1, but missing on 3.0.0-pre1/3.1.0-pre2 specifically - most likely those two
  # pre-releases were published manually rather than through the maintainer's usual CI, not
  # a hijacked account. Investigated 2026-07-15; revisit if pnpm flags it again elsewhere.
  - "@trickfilm400/rollup-plugin-off-main-thread@3.0.0-pre1"

# Don't let a trusted dependency pull in transitive deps published under unrelated names.
blockExoticSubdeps: true

# Fail the install instead of silently running an unreviewed install/postinstall script.
# Move a package here only after reviewing what its build script does.
strictDepBuilds: true
onlyBuiltDependencies:
  # Transitive dep of effect@4.0.0-beta.98 -> msgpackr@2.0.4. Install script
  # (node-gyp-build-optional-packages) only fetches a prebuilt native binary for the
  # current platform, same pattern as better-sqlite3/sharp. Maintained by kriszyp
  # (msgpackr's author). User-approved 2026-07-15.
  - msgpackr-extract
  # Pulled in by drizzle-kit (and transitively by vite/vitest already). Postinstall
  # script (node install.js) only fetches esbuild's own prebuilt native binary for the
  # current platform - same low-risk pattern as msgpackr-extract above. User-approved
  # 2026-07-16.
  - esbuild
allowBuilds:
  # See onlyBuiltDependencies comments above for the review notes.
  esbuild: true
  msgpackr-extract: true
