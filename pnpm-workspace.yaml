packages:
  - "apps/*"
  - "shared/*"
  - "domains/*"
  - "scripts"

# Pin every install to an exact version (no ^ / ~ ranges) so upgrades are always explicit.
saveExact: true

# Was `auto-install-peers = true` in .npmrc pre-v11; .npmrc is auth/registry only now.
autoInstallPeers: true

# Shared versions for common devDependencies, referenced from package.json via "catalog:".
# https://pnpm.io/catalogs
catalog:
  typescript: 7.0.2
  # Pinned to Node 24's own @types/node line (CI's actions/setup-node targets node-version:
  # 24) - already the latest 24.x release; the 26.x line tracks a newer Node major we don't
  # run yet.
  "@types/node": 24.13.3
  # oxlint 1.75.0 exists but is <24h old (minimumReleaseAge gate below) - staying on the
  # previous mature release until it clears the cooldown.
  oxlint: 1.74.0
  # oxfmt 0.60.0 exists but is <24h old (minimumReleaseAge gate below) - same as oxlint.
  oxfmt: 0.59.0
  turbo: 2.10.5
  vitest: 4.1.10
  "@effect/vitest": 4.0.0-beta.100
  # Effect v4 ("effect smol") - beta, but this is what externals/effect (vendored from the
  # Effect-TS/effect main branch) is already on, so we're tracking the same line.
  effect: 4.0.0-beta.100
  drizzle-orm: 0.45.2
  drizzle-kit: 0.31.10
  # Node runtime adapter for effect/unstable/httpapi - a separate package from `effect`
  # itself in this v4 line. Pinned to the exact same beta as `effect` above.
  "@effect/platform-node": 4.0.0-beta.100
  # React bindings for effect/unstable/reactivity's Atom/AtomRegistry - Effect-TS's own
  # official package (externals/effect/packages/atom/react in the effect monorepo itself,
  # published under the `@effect` scope), not the older standalone `@effect-atom/atom-react`
  # (still pins effect@^3.19 - checked directly against npm, incompatible with this repo's v4
  # pin - no separate `externals/effect-atom` subtree needed once this was found). Pinned to
  # the exact same beta as `effect` above, matching its own peerDependencies.
  "@effect/atom-react": 4.0.0-beta.100
  # JWT/JWKS verification for apps/server's AuthService - vendored Effect v4 has no
  # built-in JWT support (HttpApiSecurity only extracts the raw credential string).
  # jose 6.2.4 exists but is <24h old (minimumReleaseAge gate below) - staying on 6.2.3
  # until it clears the cooldown.
  jose: 6.2.3
  # node-postgres, not postgres.js - matches the driver @effect/sql-pg wraps, so a later
  # Effect-based query layer shares the same driver/connection-pool conventions.
  pg: 8.22.0
  "@types/pg": 8.20.0
  # react/react-dom 19.2.8 exist but are <24h old (minimumReleaseAge gate below) - staying
  # on 19.2.7 until they clear the cooldown.
  react: 19.2.7
  react-dom: 19.2.7
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  "@tanstack/react-router": 1.170.18
  # Not version-locked to @tanstack/react-router above - this monorepo's packages don't
  # share version numbers in lockstep, just compatible peer ranges.
  "@tanstack/router-plugin": 1.168.23
  # OIDC client for apps/web's Keycloak login (Authorization Code + PKCE) - mature,
  # framework-agnostic, avoids hand-rolling PKCE/token-refresh logic.
  "oidc-client-ts": 3.5.0

# Force patched versions for transitive dev-only vulnerabilities that the direct
# dependency hasn't bumped past yet (flagged by `pnpm audit`, part of CI's security
# check - see docs/data-model.md's "GitHub CI/CD" section).
overrides:
  # drizzle-kit@0.31.10 (latest 0.3x line) still pulls the deprecated
  # `@esbuild-kit/esm-loader` -> `@esbuild-kit/core-utils` -> esbuild@0.18.20,
  # vulnerable to GHSA-67mh-4wv8-2f99 (dev server accepts any-origin requests,
  # CWE-346). Dev-only; the patched esbuild line is API-compatible.
  esbuild: ">=0.24.3"
  # vite-plugin-top-level-await@1.6.0 (latest) pins uuid@10.0.0 exactly, vulnerable to
  # GHSA-w5hq-g745-h8pq (missing buffer bounds check, CWE-787/1285). Same v3/v4/v5
  # public API, safe bump.
  uuid: ">=11.1.1"

# Supply-chain security: https://pnpm.io/supply-chain-security
# pnpm 11 already defaults most of this; pinned explicitly so the posture can't silently
# weaken if a future pnpm major changes its defaults.

# Reject a package version until it has been public for a day - gives the community time
# to flag "zero-day" malicious releases before we can install them.
minimumReleaseAge: 1440
# Bypass the cooldown for specific package@version entries that need a hotfix immediately.
minimumReleaseAgeExclude: []

# Refuse to install a version whose publish provenance/CI attestation is weaker than the
# previously installed one (e.g. a hijacked maintainer publishing without CI).
trustPolicy: no-downgrade
trustPolicyExclude:
  # @effect/vitest@4.0.0-beta.98 flagged as a trust downgrade (prior versions had npm
  # "trusted publisher", this one has SLSA provenance attestation instead) - checked
  # npm metadata: beta.97 and beta.98 are published by the same `effect-bot` npm user,
  # same maintainer list, same source repo (Effect-TS/effect, the same upstream we
  # vendor into externals/effect), consistent with the Effect team switching their CI
  # publish mechanism rather than an account takeover. User-approved 2026-07-15;
  # revisit if pnpm flags it again elsewhere.
  # Our own catalog pin moved on to 4.0.0-beta.100 (no new trust flag raised for that
  # bump), but this beta.98 entry is still needed: alchemy@2.0.0-beta.63 bundles its own
  # devDependency on `@effect/vitest@4.0.0-beta.98` independent of our catalog pin.
  - "@effect/vitest@4.0.0-beta.98"
  # semver@6.3.1 (transitive dep of @babel/core via @tanstack/router-plugin) predates npm
  # provenance (introduced ~April 2023; 6.3.1 published 2023-07-10) and has none, while some
  # other version in its history does - a registry-side metadata touch on 2026-07-06 hit
  # every version of the package (6.0.0 from 2019 has the same modified timestamp), so this
  # reads as inconsistent provenance backfill, not a hijacked release. semver is maintained
  # by npm-cli-ops directly. Investigated 2026-07-15; revisit if pnpm flags it again elsewhere.
  - semver@6.3.1
  # @trickfilm400/rollup-plugin-off-main-thread@3.0.0-pre1 (transitive dep of workbox-build,
  # via vite-plugin-pwa) is workbox-build@7.4.1's own declared, official dependency - not
  # something injected below our tree. The original rollup-plugin-off-main-thread (by surma,
  # a Google engineer) stopped at v1.1.1; trickfilm400 has been the actively-maintained
  # community continuation since May 2024, and Google's own Workbox team adopted this exact
  # scoped fork as workbox-build's upstream. Provenance is present on 2.4.3, 2.5.0, and
  # 4.0.0-pre1, but missing on 3.0.0-pre1/3.1.0-pre2 specifically - most likely those two
  # pre-releases were published manually rather than through the maintainer's usual CI, not
  # a hijacked account. Investigated 2026-07-15; revisit if pnpm flags it again elsewhere.
  - "@trickfilm400/rollup-plugin-off-main-thread@3.0.0-pre1"

# Don't let a trusted dependency pull in transitive deps published under unrelated names.
blockExoticSubdeps: true

# Fail the install instead of silently running an unreviewed install/postinstall script.
# Move a package here only after reviewing what its build script does.
strictDepBuilds: true
onlyBuiltDependencies:
  # Transitive dep of effect@4.0.0-beta.98 -> msgpackr@2.0.4. Install script
  # (node-gyp-build-optional-packages) only fetches a prebuilt native binary for the
  # current platform, same pattern as better-sqlite3/sharp. Maintained by kriszyp
  # (msgpackr's author). User-approved 2026-07-15.
  - msgpackr-extract
  # Pulled in by drizzle-kit (and transitively by vite/vitest already). Postinstall
  # script (node install.js) only fetches esbuild's own prebuilt native binary for the
  # current platform - same low-risk pattern as msgpackr-extract above. User-approved
  # 2026-07-16.
  - esbuild
  # apps/client's PowerSync peer dep (@powersync/web -> @journeyapps/wa-sqlite).
  # Postinstall (scripts/download-dynamic-core.js) only downloads PowerSync's own
  # prebuilt libpowersync[-async].wasm release assets into dist/ - same low-risk
  # "fetch a prebuilt binary" pattern as esbuild/msgpackr-extract above, from the same
  # org (JourneyApps/PowerSync) already trusted elsewhere in this task's dependency
  # additions. User-approved 2026-07-17.
  - "@journeyapps/wa-sqlite"
  # Transitive dep of vitest (apps/client's new "test" script). Postinstall
  # (postinstall.js) only validates its native binary loads and falls back to
  # @swc/wasm via npm if not - same low-risk "prebuilt binary, verified at install
  # time" pattern as esbuild/msgpackr-extract above. User-approved 2026-07-17.
  - "@swc/core"
  # apps/infrastructure's `alchemy` dependency -> workerd (Cloudflare's own official
  # Workers runtime, published by the workerd/Cloudflare team, used by `wrangler`/
  # `alchemy dev` to run Workers locally). Postinstall (node install.js) just selects
  # the right prebuilt `@cloudflare/workerd-{platform}-{arch}` optional dependency for
  # the current machine - same low-risk "fetch a prebuilt binary" pattern as
  # esbuild/msgpackr-extract above. Reviewed 2026-07-17 - flag to the user if this
  # should instead require explicit sign-off like the entries above.
  - workerd
allowBuilds:
  # See onlyBuiltDependencies comments above for the review notes.
  "@journeyapps/wa-sqlite": true
  "@swc/core": true
  esbuild: true
  msgpackr-extract: true
  workerd: true
