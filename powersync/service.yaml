# yaml-language-server: $schema=https://unpkg.com/@powersync/cli-schemas@latest/json-schema/service-config.json
#
# Self-hosted PowerSync service config for local dev. See docs/data-model.md's
# "PowerSync sync streams" section and docker-compose.yml's `powersync`/`pg-storage`
# services for how this gets run.
_type: self-hosted

replication:
  connections:
    - type: postgresql
      uri: !env PS_DATA_SOURCE_URI
      # Default is verify-full (production); our local Postgres containers don't have
      # TLS certs configured, so the client's SSL negotiation was failing the
      # connection outright (surfaced as a generic "postgres query failed" at the
      # wire-protocol level, not a SQL error) until this was set explicitly.
      sslmode: disable

storage:
  type: postgresql
  uri: !env PS_STORAGE_SOURCE_URI
  sslmode: disable

sync_config:
  path: sync-config.yaml

api:
  tokens:
    - !env PS_API_TOKEN

# Verifies JWTs against Keycloak's realm keys (RS256, asymmetric - preferred over the
# HS256 shared-secret option this replaced). No `issuer` field set here on purpose:
# apps/server and human/browser callers reach Keycloak via `localhost:$KEYCLOAK_PORT`,
# but PowerSync (inside the compose network) must fetch JWKS via the `keycloak` service
# name - those are different hostnames, so pinning an issuer here would reject every
# token. The "powersync-audience" mapper in keycloak/realm-export.json is what actually
# scopes which tokens this accepts, via the audience check below.
client_auth:
  jwks_uri: http://keycloak:8080/realms/effective-app/protocol/openid-connect/certs
  # keycloak resolves to a container-private IP inside the compose network, which
  # PowerSync's SSRF guard blocks by default - `false` disables that guard, safe only
  # because this is a local-dev-only, non-internet-routable Docker network. Never
  # disable this in production.
  block_local_jwks: false
  audience:
    - powersync-dev
